<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>弥生会計解析ツール</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.0/build/stlite.js";

      mount({
        requirements: ["pandas"],
        entrypoint: "main.py",
        files: {
          "main.py": `
import streamlit as st
import pandas as pd

st.title("弥生会計・全項目解析くん")
st.info("GitHub Pagesでの起動に成功したンゴ！")

uploaded_file = st.file_uploader("仕訳CSVをアップロード", type="csv")

if uploaded_file:
    try:
        df = pd.read_csv(uploaded_file, encoding='cp932', header=None)
        st.success("読み込み完了！")
        st.write("### データのプレビュー")
        st.dataframe(df.head())
        
        st.write("### ユニーク値の集計")
        col_idx = st.selectbox("項目を選んでな", range(len(df.columns)))
        unique_vals = df[col_idx].dropna().unique()
        st.write(unique_vals.tolist())
    except Exception as e:
        st.error(f"エラー: {e}")
          `
        }
      }, document.getElementById("root"));
    </script>
  </body>
</html>
